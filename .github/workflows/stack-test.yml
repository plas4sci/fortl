name: Stack Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: stack test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Haskell and Stack
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-setup-ghc: true
          cache: true

      - name: Run tests
        run: stack test --no-terminal
